<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zentra - Acceso Multi-Tenant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--bg-main);
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
        }
        .login-container {
            background: var(--bg-card);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--border-color);
        }
        .login-logo {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-primary);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .login-subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--accent-primary);
        }
        .btn-login {
            width: 100%;
            padding: 0.8rem;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }
        .btn-login:hover {
            background: var(--accent-hover);
        }
        .btn-login:active {
            transform: scale(0.98);
        }
        .error-message {
            color: var(--danger-color);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
        }
        
        /* Modal Selección de Empresa */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            border: 1px solid var(--border-color);
        }
        .empresa-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .empresa-card {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .empresa-card:hover {
            border-color: var(--accent-primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2);
        }
        .empresa-card h3 {
            margin: 0 0 0.5rem 0;
            font-size: 1.1rem;
        }
        .empresa-card p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .default-checkbox {
            margin-top: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-logo">
            <i class="fa-solid fa-bolt"></i> Zentra
        </div>
        <div class="login-subtitle">MiddleWare SIFEN Multi-Tenant</div>
        
        <div id="error-msg" class="error-message">Credenciales inválidas</div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" class="form-control" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" class="form-control" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login" id="btn-submit">
                <i class="fa-solid fa-right-to-bracket"></i> Iniciar Sesión
            </button>
        </form>
    </div>

    <!-- Modal Selección de Empresa -->
    <div class="modal-overlay" id="empresa-modal">
        <div class="modal-content">
            <h2 style="margin-top:0; text-align:center;">Seleccionar Empresa Activa</h2>
            <p style="color:var(--text-secondary); text-align:center;">
                Elija la empresa con la cual operará en esta sesión.
            </p>
            
            <div class="empresa-grid" id="empresa-grid">
                <!-- Tarjetas generadas por JS -->
            </div>
            
            <div class="default-checkbox">
                <input type="checkbox" id="chk-default">
                <label for="chk-default">Recordar mi elección e ingresar automáticamente la próxima vez</label>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            const errorMsg = document.getElementById('error-msg');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verificando...';
            errorMsg.style.display = 'none';

            try {
                const res = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Error al iniciar sesión');
                }

                // Guardar token temporal y estado de suscripcion
                localStorage.setItem('jwt_token_temp', data.token);
                if (data.estadoSuscripcion) {
                    localStorage.setItem('estado_suscripcion', data.estadoSuscripcion);
                }

                // Evaluar si tiene empresa por defecto y empresas cargadas
                if (data.empresaDefaultId && data.empresas.some(e => e.id === data.empresaDefaultId)) {
                    // Auto-seleccionar
                    seleccionarEmpresa(data.empresaDefaultId, false, data.token);
                } else if (data.empresas && data.empresas.length > 0) {
                    // Mostrar modal de selección
                    mostrarModalEmpresas(data.empresas, data.token);
                } else {
                    // Sin empresas, forzar login vacío y llevar a onboarding (Fase futura)
                    localStorage.setItem('jwt_token', data.token);
                    window.location.href = '/index.html';
                }

            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Iniciar Sesión';
            }
        });

        function mostrarModalEmpresas(empresas, tempToken) {
            const grid = document.getElementById('empresa-grid');
            grid.innerHTML = '';
            
            empresas.forEach(emp => {
                const card = document.createElement('div');
                card.className = 'empresa-card';
                card.innerHTML = `
                    <h3>${emp.razonSocial}</h3>
                    <p>RUC: ${emp.ruc}-${emp.dv}</p>
                    <p style="font-size:0.8rem; margin-top:10px;">
                        <span style="background:var(--accent-primary); color:white; padding:2px 6px; border-radius:4px;">
                            ${emp.ambiente}
                        </span>
                    </p>
                `;
                card.onclick = () => seleccionarEmpresa(emp.id, document.getElementById('chk-default').checked, tempToken);
                grid.appendChild(card);
            });
            
            document.getElementById('empresa-modal').style.display = 'flex';
        }

        async function seleccionarEmpresa(empresaId, setDefault, token) {
            try {
                const res = await fetch('/api/v1/auth/seleccionar-empresa', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ empresaId, setDefault: setDefault.toString() })
                });

                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('jwt_token', data.token);
                    localStorage.setItem('empresa_activa', JSON.stringify(data.empresa));
                    localStorage.removeItem('jwt_token_temp');
                    window.location.href = '/index.html';
                } else {
                    alert(data.error);
                }
            } catch (e) {
                alert('Error al seleccionar empresa');
            }
        }
    </script>
</body>
</html>
