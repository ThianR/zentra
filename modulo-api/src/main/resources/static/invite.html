<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitar Usuarios - Zentra</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            padding: 40px;
        }
        .admin-panel {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 12px;
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid var(--border-color);
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .form-control, select.form-control {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: white;
            box-sizing: border-box;
        }
        .btn-primary {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        #result-msg {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }
    </style>
    <script src="js/auth.js"></script>
    <script>
        // Redirigir al login si no hay token
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('jwt_token');
            if (!token) {
                window.location.href = '/login.html';
            }
        });
    </script>
</head>
<body>

    <div class="admin-panel">
        <h2 style="margin-top: 0;">Invitar a un Operador/Admin</h2>
        <p style="color: var(--text-secondary); margin-bottom: 30px;">Envíe una invitación segura a un colaborador para que se una a su cuenta de Zentra.</p>
        
        <form id="inviteForm" onsubmit="sendInvite(event)">
            <div class="form-group">
                <label>Correo Electrónico del Invitado</label>
                <input type="email" id="email" class="form-control" required placeholder="ejemplo@empresa.com">
            </div>
            <div class="form-group">
                <label>Rol Asignado</label>
                <select id="rol" class="form-control" required>
                    <option value="OPERADOR">Operador (Solo emisión)</option>
                    <option value="ADMIN">Administrador (Puede invitar a otros y configurar)</option>
                </select>
            </div>
            
            <button type="submit" class="btn-primary" id="btn-submit">Enviar Invitación</button>
        </form>

        <div id="result-msg"></div>
        <div style="margin-top: 20px;">
            <a href="/index.html" style="color: var(--accent-primary); text-decoration: none;">&larr; Volver al Dashboard</a>
        </div>
    </div>

    <script>
        async function sendInvite(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            const resultMsg = document.getElementById('result-msg');
            
            const payload = {
                email: document.getElementById('email').value,
                rol: document.getElementById('rol').value
            };

            btn.disabled = true;
            btn.innerText = 'Enviando...';
            resultMsg.style.display = 'none';

            const token = localStorage.getItem('jwt_token');

            try {
                const response = await fetch('/api/v1/usuarios/invitar', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                resultMsg.style.display = 'block';
                if (response.ok) {
                    resultMsg.style.backgroundColor = 'rgba(40, 167, 69, 0.2)';
                    resultMsg.style.color = '#28a745';
                    resultMsg.style.border = '1px solid #28a745';
                    resultMsg.innerText = data.message;
                    document.getElementById('inviteForm').reset();
                } else {
                    resultMsg.style.backgroundColor = 'rgba(220, 53, 69, 0.2)';
                    resultMsg.style.color = '#dc3545';
                    resultMsg.style.border = '1px solid #dc3545';
                    resultMsg.innerText = data.error || 'Ocurrió un error';
                }
            } catch (err) {
                resultMsg.style.display = 'block';
                resultMsg.style.backgroundColor = 'rgba(220, 53, 69, 0.2)';
                resultMsg.style.color = '#dc3545';
                resultMsg.innerText = 'Error de red';
            } finally {
                btn.disabled = false;
                btn.innerText = 'Enviar Invitación';
            }
        }
    </script>
</body>
</html>
