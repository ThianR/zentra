spring:
  devtools:
    restart:
      enabled: false
  application:
    name: zentra-api
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SMTP_USERNAME:zentra.sifen@gmail.com}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres?useUnicode=true&characterEncoding=UTF-8
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      # Solo ejecuta schema.sql (DDL) al iniciar — crea tablas si no existen.
      # Los datos de referencia los carga DatabaseMigrationConfig.java
      # después de migrar los índices de sifen_referencia.
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: []
      encoding: UTF-8
  jpa:
    hibernate:
      # 'validate' verifica el esquema contra entidades sin modificarlo.
      # El DDL lo maneja schema.sql directamente.
      ddl-auto: update
    show-sql: true
    # Garantiza que schema.sql y data.sql se ejecuten antes que Hibernate
    defer-datasource-initialization: true
    properties:
      hibernate:
        jdbc.time_zone: UTC
        connection:
          useUnicode: true
          characterEncoding: UTF-8
          CharSet: utf-8

server:
  port: 9090
  servlet:
    encoding:
      charset: UTF-8
      force: true
